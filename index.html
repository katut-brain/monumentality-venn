<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モニュメンタリティ可視化</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1ea; --canvas:#fbf9f4; --ink:#222019; --ink2:#6f665a;
    --accent:#9a6b3f; --hair:#ddd5c6; --hair2:#e7e0d2; --place:#e9e3d6;
    --serif:"Zen Old Mincho",serif;
    --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);
       line-height:1.6;-webkit-font-smoothing:antialiased;}

  header{padding:40px 20px 4px;text-align:center;}
  .kicker{font-size:.66rem;letter-spacing:.34em;text-transform:uppercase;color:var(--accent);
          font-weight:700;margin-bottom:10px;}
  header h1{font-family:var(--serif);font-size:2.05rem;font-weight:600;margin:0;letter-spacing:.06em;
            color:var(--ink);}
  header p{margin:10px auto 0;font-size:.83rem;color:var(--ink2);max-width:30em;}
  .rule{width:34px;height:1px;background:var(--accent);margin:16px auto 0;opacity:.6;}

  .legend{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:22px 0 4px;
          font-size:.72rem;color:var(--ink2);}
  .legend span{display:inline-flex;align-items:center;gap:8px;}
  .lc{width:22px;height:22px;border-radius:50%;}
  .lc.solid{border:1.5px solid var(--ink);}
  .lc.dash{border:1.5px dashed var(--ink);opacity:.7;}
  .lq{font-family:var(--serif);font-size:1.3rem;color:rgba(34,32,25,.26);font-weight:600;line-height:1;}

  .layout{display:flex;flex-wrap:wrap;gap:30px;padding:20px 26px 72px;max-width:1180px;
          margin:0 auto;justify-content:center;}
  .panel{flex:0 0 232px;align-self:flex-start;}
  .panel h2{font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;margin:0 0 12px 2px;
            color:var(--ink2);font-weight:700;}
  .cat-btn{display:flex;align-items:baseline;justify-content:space-between;gap:8px;width:100%;
           text-align:left;border:0;border-bottom:1px solid var(--hair2);background:transparent;
           padding:11px 4px 11px 14px;margin:0;font-family:var(--sans);font-size:.9rem;cursor:pointer;
           color:var(--ink);position:relative;transition:.16s ease;}
  .cat-btn:before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
                  width:2px;height:0;background:var(--accent);transition:height .16s ease;}
  .cat-btn:hover{color:var(--accent);padding-left:18px;}
  .cat-btn.active{color:var(--ink);font-weight:700;}
  .cat-btn.active:before{height:62%;}
  .cat-btn small{color:var(--ink2);opacity:.75;font-size:.66rem;font-weight:400;white-space:nowrap;}

  .stage-wrap{flex:1 1 auto;}
  .stage-head{text-align:center;margin-bottom:14px;min-height:42px;}
  .stage-head .t{font-family:var(--serif);font-size:1.5rem;font-weight:600;letter-spacing:.04em;}
  .stage-head .s{font-size:.72rem;color:var(--ink2);margin-top:2px;letter-spacing:.02em;}

  /* the enclosing frame = 外枠 */
  .frame{position:relative;width:760px;max-width:100%;height:730px;border:1px solid var(--hair);
         border-radius:26px;margin:0 auto;overflow:hidden;background:var(--canvas);
         box-shadow:0 18px 50px -28px rgba(60,48,30,.4), inset 0 1px 0 rgba(255,255,255,.6);}
  .frame svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .circle-label{font-family:var(--sans);font-size:11.5px;fill:var(--ink);font-weight:500;letter-spacing:.02em;
                paint-order:stroke;stroke:var(--canvas);stroke-width:3.5px;stroke-linejoin:round;}
  .divider-label{font-family:var(--sans);font-size:10.5px;fill:#b7ad9b;letter-spacing:.16em;}

  .card{position:absolute;width:58px;transform:translate(-50%,-50%);text-align:center;
        cursor:default;transition:transform .14s cubic-bezier(.2,.7,.3,1);}
  .card:hover{transform:translate(-50%,-50%) scale(1.18);z-index:50;}
  .thumb{width:54px;height:54px;border-radius:50%;overflow:hidden;position:relative;margin:0 auto;
         border:1.5px solid var(--canvas);background:var(--place);
         box-shadow:0 0 0 1px rgba(34,32,25,.55), 0 4px 10px -4px rgba(40,30,18,.5);
         display:flex;align-items:center;justify-content:center;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.92) contrast(1.02);}
  .thumb .noimg{font-size:.5rem;color:var(--ink2);padding:2px;line-height:1.12;font-weight:500;}
  .qmark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
         font-family:var(--serif);font-size:2.5rem;font-weight:600;color:rgba(20,18,12,.30);pointer-events:none;}
  .nm{font-size:.575rem;margin-top:4px;color:var(--ink);width:78px;margin-left:-10px;line-height:1.16;
      letter-spacing:.01em;text-shadow:0 0 3px var(--canvas),0 0 3px var(--canvas),0 0 2px var(--canvas);}

  .hint{text-align:center;font-size:.7rem;color:#a99f8d;margin-top:14px;letter-spacing:.02em;}
  .share{text-align:center;margin-top:14px;}
  .share button{font-family:var(--sans);border:1px solid var(--ink);background:transparent;color:var(--ink);
        border-radius:999px;padding:9px 22px;font-size:.78rem;letter-spacing:.04em;cursor:pointer;transition:.16s;}
  .share button:hover{background:var(--ink);color:var(--canvas);}
  .toast{font-size:.74rem;color:var(--accent);margin-left:12px;opacity:0;transition:.3s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="kicker">Monumentality</div>
  <h1>モニュメンタリティの解剖</h1>
  <p>観点をひとつ選ぶと、その項目が円となって重なり、各事例がどこに位置づくかが見えてきます。</p>
  <div class="rule"></div>
</header>

<div class="legend">
  <span><i class="lc solid"></i>実線の円 ＝ 該当（◎）</span>
  <span><i class="lc dash"></i>内側の点線円 ＝ おそらく該当（○）</span>
  <span><i class="lq">?</i> 不確か</span>
</div>

<div class="layout">
  <aside class="panel"><h2>観点 / Perspective</h2><div id="cats"></div></aside>
  <main class="stage-wrap">
    <div class="stage-head" id="head"></div>
    <div class="frame" id="frame"><svg id="svg" viewBox="0 0 760 730" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="hint">円の外＝その観点に該当しない事例 ／ カードにカーソルを乗せると拡大</div>
    <div class="share">
      <button id="shareBtn">🔗 この表示のリンクをコピー</button>
      <span class="toast" id="toast">コピーしました</span>
    </div>
  </main>
</div>

<script src="data.js?v=20260616"></script>
<script>
const W=760, H=730;                 // frame coordinate space
const CX=380, CYC=300;              // circle-area center
const OUT_Y=658;                    // outside strip baseline
const frame=document.getElementById('frame');
const svg=document.getElementById('svg');
const head=document.getElementById('head');

// ---- group elements into ordered categories ----
const cats=[]; const seen={};
ELEMENTS.forEach(e=>{
  if(!seen[e.category]){seen[e.category]={category:e.category,items:[]};cats.push(seen[e.category]);}
  seen[e.category].items.push(e);
});

// ---- sidebar ----
const catBox=document.getElementById('cats');
cats.forEach((c,idx)=>{
  const b=document.createElement('button');b.className='cat-btn';
  b.innerHTML=`${c.category}<small>${c.items.length}項目</small>`;
  b.dataset.idx=idx;b.onclick=()=>select(idx);catBox.appendChild(b);
});

// geometry presets by circle count
function preset(n){
  return ({
    1:{R:225,spread:0},
    2:{R:185,spread:98},
    3:{R:165,spread:122},
    4:{R:150,spread:140},
    5:{R:140,spread:158},
  })[n] || {R:130,spread:170};
}
function centers(n,spread){
  if(n===1) return [{x:CX,y:CYC}];
  if(n===2) return [{x:CX-spread,y:CYC},{x:CX+spread,y:CYC}];
  const arr=[];
  for(let i=0;i<n;i++){
    const a=(-90 + i*360/n)*Math.PI/180;
    arr.push({x:CX+spread*Math.cos(a),y:CYC+spread*Math.sin(a)});
  }
  return arr;
}

function norm(v){ // collapse to membership info
  if(!v) return null;
  const conf = v.startsWith('maybe') ? 'maybe' : 'yes';
  const q = v.endsWith('_q');
  return {conf,q};
}

let current=0;
function select(idx){
  current=idx;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',+b.dataset.idx===idx));
  const cat=cats[idx];
  const items=cat.items;
  const n=items.length;
  const {R,spread}=preset(n);
  const C=centers(n,spread);
  head.innerHTML=`<div class="t">${cat.category}</div><div class="s">${n}つの項目${n>=2?' ・ 円の重なりが多面性を示す':''}</div>`;

  // clear
  svg.innerHTML='';
  [...frame.querySelectorAll('.card')].forEach(e=>e.remove());

  const NS='http://www.w3.org/2000/svg';
  // draw solid + dashed circles
  C.forEach((c,i)=>{
    const c1=document.createElementNS(NS,'circle');
    c1.setAttribute('cx',c.x);c1.setAttribute('cy',c.y);c1.setAttribute('r',R);
    c1.setAttribute('fill','rgba(154,107,63,0.045)');c1.setAttribute('stroke','#26231c');c1.setAttribute('stroke-width','1.25');
    svg.appendChild(c1);
    const c2=document.createElementNS(NS,'circle');
    c2.setAttribute('cx',c.x);c2.setAttribute('cy',c.y);c2.setAttribute('r',R*0.58);
    c2.setAttribute('fill','none');c2.setAttribute('stroke','#26231c');c2.setAttribute('stroke-width','1');
    c2.setAttribute('stroke-dasharray','4 5');c2.setAttribute('opacity','0.45');
    svg.appendChild(c2);
    // label at outward perimeter
    const ang = n===1 ? -Math.PI/2 : Math.atan2(c.y-CYC,c.x-CX);
    let lx=c.x+Math.cos(ang)*(R+2), ly=c.y+Math.sin(ang)*(R+2);
    ly = ly<CYC ? ly-6 : ly+14;
    ly = Math.max(15, Math.min(H-8, ly));     // keep inside frame
    lx = Math.max(86, Math.min(W-86, lx));
    const t=document.createElementNS(NS,'text');
    t.setAttribute('class','circle-label');
    t.setAttribute('x',lx);t.setAttribute('y',ly);
    t.setAttribute('text-anchor','middle');
    t.textContent=items[i].label;
    svg.appendChild(t);
  });

  // ---- classify cases: single-circle / intersection / outside ----
  const single={}; const multi={}; const outside=[];
  CASES.forEach(cs=>{
    const mem=[]; let anyMaybe=false, anyQ=false;
    items.forEach((it,i)=>{
      const info=norm(cs.scores[it.id]);
      if(info){mem.push(i); if(info.conf==='maybe')anyMaybe=true; if(info.q)anyQ=true;}
    });
    if(mem.length===0){outside.push({cs,q:false});return;}
    const ring = anyMaybe ? 'in' : 'ring';   // ○ -> inner dashed, ◎ -> ring band
    if(mem.length===1){
      const k=mem[0]+'|'+ring;
      (single[k]=single[k]||{i:mem[0],ring,list:[]}).list.push({cs,q:anyQ});
    }else{
      const k=mem.join('-')+'|'+ring;
      (multi[k]=multi[k]||{mem,ring,list:[]}).list.push({cs,q:anyQ});
    }
  });

  // ---- build nodes with smart initial anchors ----
  const nodes=[];
  // single-membership: fan the cards out angularly along the ring / inner band
  Object.values(single).forEach(g=>{
    const c=C[g.i], m=g.list.length;
    const rr = (g.ring==='in' ? 0.38 : 0.70) * R;
    const outAng = (n===1) ? -Math.PI/2 : Math.atan2(c.y-CYC, c.x-CX);
    g.list.forEach((item,k)=>{
      let ang;
      if(n===1){ ang = -Math.PI/2 + k*2*Math.PI/m; }      // spread around full circle
      else{
        const span = m<=1 ? 0 : Math.min(2.5, 0.7+m*0.34); // widen arc with count
        ang = outAng + (m===1?0:(k/(m-1)-0.5)*span);
      }
      nodes.push({cs:item.cs,q:item.q,mem:[g.i],single:true,x:c.x+Math.cos(ang)*rr,y:c.y+Math.sin(ang)*rr});
    });
  });
  // intersection: seed near centroid, jittered
  Object.values(multi).forEach(g=>{
    let mx=0,my=0; g.mem.forEach(i=>{mx+=C[i].x;my+=C[i].y;}); mx/=g.mem.length; my/=g.mem.length;
    if(g.ring==='in'){ mx+=(CX-mx)*0.12; my+=(CYC-my)*0.12; }
    g.list.forEach((item,k)=>{
      const a=k*2.399; // golden-angle scatter
      const sx=mx+Math.cos(a)*18*Math.sqrt(k), sy=my+Math.sin(a)*18*Math.sqrt(k);
      nodes.push({cs:item.cs,q:item.q,mem:g.mem,single:false,ax:mx,ay:my,x:sx,y:sy});
    });
  });

  // ---- relax: push apart overlaps; single-membership cards stay in their circle,
  //      multi-membership cards are softly held near their overlap centroid ----
  const CR=29, minD=58, lim=R-CR-6;
  for(let it=0; it<150; it++){
    for(let a=0;a<nodes.length;a++)for(let b=a+1;b<nodes.length;b++){
      let dx=nodes[b].x-nodes[a].x, dy=nodes[b].y-nodes[a].y;
      let d=Math.hypot(dx,dy);
      if(d===0){dx=Math.random()-0.5;dy=Math.random()-0.5;d=Math.hypot(dx,dy);}
      if(d<minD){
        const p=(minD-d)/2/d;
        nodes[a].x-=dx*p; nodes[a].y-=dy*p;
        nodes[b].x+=dx*p; nodes[b].y+=dy*p;
      }
    }
    nodes.forEach(nd=>{
      if(nd.single){
        const c=C[nd.mem[0]]; let dx=nd.x-c.x, dy=nd.y-c.y, d=Math.hypot(dx,dy);
        if(d>lim){ nd.x=c.x+dx/d*lim; nd.y=c.y+dy/d*lim; }   // hard containment
      }else{
        nd.x+=(nd.ax-nd.x)*0.05; nd.y+=(nd.ay-nd.y)*0.05;    // soft pull to overlap centroid
      }
      nd.x=Math.max(CR+6,Math.min(W-CR-6,nd.x));
      nd.y=Math.max(CR+10,Math.min(OUT_Y-78,nd.y));
    });
  }
  nodes.forEach(nd=>addCard(nd.cs,nd.q,nd.x,nd.y));

  function addCard(cs,q,x,y){
    const d=document.createElement('div');d.className='card';
    d.style.left=(x/W*100)+'%';d.style.top=(y/H*100)+'%';
    const inner = cs.img ? `<img src="${cs.img}" alt="${cs.name}" loading="lazy">`
                         : `<span class="noimg">${cs.name}</span>`;
    d.innerHTML=`<div class="thumb">${inner}${q?'<span class="qmark">?</span>':''}</div><div class="nm">${cs.name}</div>`;
    frame.appendChild(d);
  }

  // ---- outside cases: row(s) along the bottom inside the frame ----
  if(outside.length){
    const sp=58, rowH=58, bottomY=680;
    const per=Math.min(outside.length, Math.floor((W-44)/sp));
    const rows=Math.ceil(outside.length/per);
    const baseY=bottomY-(rows-1)*rowH;
    const NS2='http://www.w3.org/2000/svg';
    const dl=document.createElementNS(NS2,'text');
    dl.setAttribute('class','divider-label');dl.setAttribute('x',CX);dl.setAttribute('y',baseY-42);
    dl.setAttribute('text-anchor','middle');dl.textContent='— どの円にも入らない —';
    svg.appendChild(dl);
    outside.forEach((item,k)=>{
      const row=Math.floor(k/per);
      const inRow=Math.min(per, outside.length-row*per);
      const col=k%per;
      addCard(item.cs,item.q, CX+(col-(inRow-1)/2)*sp, baseY+row*rowH);
    });
  }

  const u=new URL(location);u.searchParams.set('cat',idx);history.replaceState(null,'',u);
}

document.getElementById('shareBtn').onclick=()=>{
  navigator.clipboard.writeText(location.href).then(()=>{
    const t=document.getElementById('toast');t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1600);
  });
};

const start=new URL(location).searchParams.get('cat');
select(start!==null && cats[+start] ? +start : 0);
</script>
</body>
</html>
